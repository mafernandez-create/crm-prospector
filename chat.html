<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GPF Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:  #1F4E79; --blue2: #2E75B6; --light: #EEF4FB;
      --bg:    #F5F7FA; --white: #FFFFFF; --border: #E2E8F0;
      --tool:  #FFF8E1; --radius: 18px;
      --header: 56px;  --input: 68px;
    }
    html, body { height: 100%; overflow: hidden; background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    header {
      position: fixed; top: 0; left: 0; right: 0; height: var(--header);
      background: var(--blue); color: #fff;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }
    .title    { font-size: 16px; font-weight: 600; }
    .subtitle { font-size: 11px; opacity: .7; margin-top: 1px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: #94a3b8; transition: background .4s; }
    .dot.ok  { background: #4ADE80; }
    .dot.err { background: #F87171; }

    #messages {
      position: fixed; top: var(--header); bottom: var(--input);
      left: 0; right: 0; overflow-y: auto; padding: 14px 12px;
      scroll-behavior: smooth;
    }
    .msg { display: flex; margin-bottom: 10px; animation: fi .2s ease; }
    .msg.user      { justify-content: flex-end; }
    .msg.assistant { justify-content: flex-start; }
    .msg.tool      { justify-content: flex-start; }
    @keyframes fi { from { opacity:0; transform:translateY(4px); } to { opacity:1; } }

    .bubble {
      max-width: 84%; padding: 10px 14px; border-radius: var(--radius);
      font-size: 14px; line-height: 1.55; word-wrap: break-word;
    }
    .msg.user      .bubble { background: var(--blue2); color:#fff; border-bottom-right-radius:5px; }
    .msg.assistant .bubble { background: var(--white); color:#1a1a2e; border-bottom-left-radius:5px; box-shadow:0 1px 4px rgba(0,0,0,.08); }
    .msg.tool      .bubble { background: var(--tool); color:#92400e; font-size:12.5px; border:1px solid #fde68a; border-bottom-left-radius:5px; padding:6px 12px; }

    .bubble p           { margin-bottom: 6px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble strong      { font-weight: 600; }
    .bubble h3          { font-size:14px; font-weight:700; margin:6px 0 3px; color:var(--blue); }
    .bubble h4          { font-size:13px; font-weight:600; margin:5px 0 2px; }
    .bubble ul          { padding-left:18px; margin:4px 0; }
    .bubble li          { margin-bottom:2px; }
    .bubble code        { background:#f1f5f9; padding:1px 5px; border-radius:4px; font-size:12px; font-family:monospace; }
    .bubble hr          { border:none; border-top:1px solid var(--border); margin:8px 0; }
    .bubble table       { border-collapse:collapse; font-size:12px; margin:6px 0; width:100%; }
    .bubble th,.bubble td { border:1px solid var(--border); padding:4px 8px; text-align:left; }
    .bubble th          { background:var(--light); font-weight:600; }

    /* acción inline para confirmaciones */
    .action-bar { display:flex; gap:8px; margin-top:10px; }
    .btn-confirm { background:#1F4E79; color:#fff; border:none; border-radius:12px; padding:7px 16px; font-size:13px; cursor:pointer; }
    .btn-cancel  { background:#f1f5f9; color:#374151; border:none; border-radius:12px; padding:7px 16px; font-size:13px; cursor:pointer; }

    .typing .bubble { display:flex; gap:5px; align-items:center; padding:12px 16px; }
    .dot-anim { width:7px; height:7px; background:#94a3b8; border-radius:50%; animation:b 1.2s infinite; }
    .dot-anim:nth-child(2) { animation-delay:.2s; }
    .dot-anim:nth-child(3) { animation-delay:.4s; }
    @keyframes b { 0%,80%,100%{transform:scale(1)} 40%{transform:scale(1.4)} }

    #quickBar {
      position: fixed; bottom: var(--input); left:0; right:0;
      background: var(--white); border-top:1px solid var(--border);
      overflow-x:auto; display:none; padding:6px 10px;
    }
    #quickBar.on { display:block; }
    #quickRow { display:flex; gap:6px; }
    .qa { white-space:nowrap; font-size:12px; padding:5px 12px;
      background:var(--light); color:var(--blue); border:1px solid #bfdbfe;
      border-radius:20px; cursor:pointer; }
    .qa:hover { background:#dbeafe; }

    #input-bar {
      position:fixed; bottom:0; left:0; right:0; height:var(--input);
      background:var(--white); border-top:1px solid var(--border);
      display:flex; align-items:center; gap:8px; padding:10px 12px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
    }
    #userInput {
      flex:1; border:1.5px solid var(--border); border-radius:24px;
      padding:10px 16px; font-size:15px; outline:none; resize:none;
      max-height:110px; overflow-y:auto; line-height:1.4;
      background:var(--bg); color:#1a1a2e; transition:border-color .2s;
    }
    #userInput:focus { border-color:var(--blue2); }
    #userInput::placeholder { color:#9CA3AF; }
    #sendBtn {
      width:44px; height:44px; border-radius:50%; border:none;
      background:var(--blue); color:#fff; font-size:20px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0; transition:background .2s, transform .1s;
    }
    #sendBtn:hover   { background:var(--blue2); }
    #sendBtn:active  { transform:scale(.92); }
    #sendBtn:disabled { background:#94a3b8; cursor:not-allowed; }
  </style>
</head>
<body>

<header>
  <div><div class="title">🏗️ GPF Assistant</div><div class="subtitle" id="stTxt">Conectando…</div></div>
  <div class="dot" id="stDot"></div>
</header>

<div id="messages"></div>

<div id="quickBar">
  <div id="quickRow">
    <button class="qa" onclick="ask('¿Qué visitas tengo hoy?')">📅 Hoy</button>
    <button class="qa" onclick="ask('Estudios de Cádiz sin visita en 30 días')">📍 Cádiz pendientes</button>
    <button class="qa" onclick="ask('¿Cuántas visitas llevo esta semana?')">📊 Stats semana</button>
    <button class="qa" onclick="ask('Arquitectura en Jerez de la Frontera')">🏛️ Jerez</button>
    <button class="qa" onclick="ask('Muéstrame el planificador de esta semana')">🗓️ Planificador</button>
    <button class="qa" onclick="ask('Ingenierías en Sevilla con score alto')">⚙️ Ing. Sevilla</button>
    <button class="qa" onclick="ask('Arquitecturas en Jerez de la Frontera que no estén en el CRM')">🔍 Nuevas en Jerez</button>
    <button class="qa" onclick="ask('¿Qué eventos tengo hoy en el calendario?')">📅 Agenda</button>
    <button class="qa" onclick="ask('Arquitecturas en Jerez de la Frontera, tanto las del CRM como las que no estén')">🔀 Todas en Jerez</button>

</div>

<div id="input-bar">
  <textarea id="userInput" placeholder="Pregunta sobre el CRM…" rows="1"></textarea>
  <button id="sendBtn" onclick="sendMessage()">↑</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script>
// ══════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════
const GAS = 'https://script.google.com/macros/s/AKfycbzh2oFEM2QcL0OFef1dqz36b0C1f8qTMlvGdhoWATMwF5r2umlZpYdrq-7w86i6GF8/exec';
const FB  = { apiKey:"AIzaSyCVxMjrIfB4MrYiUzvKzt8fJeKKNne-Cm0", authDomain:"ferroplast-crm.firebaseapp.com", projectId:"ferroplast-crm", storageBucket:"ferroplast-crm.firebasestorage.app", messagingSenderId:"90876822103", appId:"1:90876822103:web:eb7acb645d7205bd0f1912" };

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let db = null;
let studioCache = null;
let history = [];   // historial de conversación (sin datos crudos de CRM)
let busy = false;
let pendingAction = null; // acción pendiente de confirmación

// ══════════════════════════════════════════
// FIREBASE
// ══════════════════════════════════════════
async function initFB() {
  try {
    if (!firebase.apps.length) firebase.initializeApp(FB);
    db = firebase.firestore();
    await db.collection('_meta').doc('ping').set({ ts: Date.now() });
    setStatus('ok', 'CRM conectado ✓');
    document.getElementById('quickBar').classList.add('on');
    return true;
  } catch(e) {
    setStatus('err', 'Sin conexión Firebase');
    return false;
  }
}

async function getStudios() {
  if (studioCache) return studioCache;
  const snap = await db.collection('studios').get();
  studioCache = snap.docs.map(d => {
    const data = d.data();
    if (data.id == null) data.id = parseInt(d.id) || d.id;
    data._docId = d.id;
    return data;
  });
  return studioCache;
}

// ══════════════════════════════════════════
// INTENT DETECTION — extrae parámetros del mensaje
// ══════════════════════════════════════════
const PROVINCIAS = ['Cádiz','Málaga','Granada','Sevilla','Huelva','Córdoba','Jaén','Almería','Toledo','Cáceres','Badajoz','Ciudad Real','Albacete','Cuenca','Alicante','Murcia','Las Palmas','Santa Cruz de Tenerife'];
const TIPOS      = ['arquitectura','ingenieria','ingeniería','constructora','promotora','aapp','aguas','regantes'];
const DIAS_SEM   = { lunes:1, martes:2, miércoles:3, miercoles:3, jueves:4, viernes:5, sábado:6, sabado:6, domingo:0 };

function detectIntent(txt) {
  const t = txt.toLowerCase();
  const intent = { actions: [], provincia: null, ciudad: null, tipo: null, nombre: null, studioId: null, fecha: null, dias: null };

  // acciones
  if (/busca|muestra|dame|lista|encuentra|hay|tienes/.test(t))   intent.actions.push('search');
  if (/ficha|detalle|información|datos|info\b/.test(t))          intent.actions.push('detail');
  if (/planificador|agenda|visitas planificadas|programad/.test(t)) intent.actions.push('planificador');
  if (/añade|agrega|pon|programa|incluye/.test(t) && /agenda|planificador|dia|fecha/.test(t)) intent.actions.push('add_plan');
  if (/elimina|quita|borra/.test(t) && /agenda|planificador/.test(t)) intent.actions.push('del_plan');
  if (/registra|anota|guarda|he visitado|he llamado|llamé|visité/.test(t)) intent.actions.push('add_act');
  if (/estadística|cuántas|cuantas|resumen|semana|hoy/.test(t))  intent.actions.push('stats');
  if (/no.*crm|sin.*crm|nueva|nuevas|sin.*registr|que falt|que no ten|que no est|no est.*crm|descono/.test(t)) intent.actions.push('search_new');
  if (!intent.actions.length) intent.actions.push('search');

  // provincia
  for (const p of PROVINCIAS) { if (t.includes(p.toLowerCase())) { intent.provincia = p; break; } }

  // ciudad — buscar "en [Ciudad]" o "de [Ciudad]" con mayúscula inicial
  const cityM = txt.match(/\ben\s+([A-ZÁÉÍÓÚÜÑ][a-záéíóúüñA-ZÁÉÍÓÚÜÑ]+(?:\s+(?:de|del|la|las|los|el|San|Santa|Los|Las)\s+[A-ZÁÉÍÓÚÜÑ][a-záéíóúüñ]+)*)/);
  if (cityM) {
    const candidate = cityM[1].trim();
    if (!PROVINCIAS.some(p => p.toLowerCase() === candidate.toLowerCase())) {
      intent.ciudad = candidate;
    }
  }

  // tipo
  for (const tp of TIPOS) { if (t.includes(tp)) { intent.tipo = tp.replace('ingeniería','ingenieria'); break; } }

  // studio ID directo (ej: "estudio 277", "studio 28")
  const idM = t.match(/estudio\s+(\d+)|studio\s+(\d+)|id\s+(\d+)/);
  if (idM) intent.studioId = parseInt(idM[1] || idM[2] || idM[3]);

  // días sin visita
  const diasM = t.match(/(\d+)\s*d[ií]as/);
  if (diasM) intent.dias = parseInt(diasM[1]);

  // fecha
  const hoy = new Date();
  if (/\bhoy\b/.test(t))   intent.fecha = hoy.toISOString().split('T')[0];
  if (/\bmañana\b/.test(t)) { const d = new Date(hoy); d.setDate(d.getDate()+1); intent.fecha = d.toISOString().split('T')[0]; }
  for (const [dia, num] of Object.entries(DIAS_SEM)) {
    if (t.includes(dia)) {
      const d = new Date(hoy);
      const diff = (num - d.getDay() + 7) % 7 || 7;
      d.setDate(d.getDate() + diff);
      intent.fecha = d.toISOString().split('T')[0];
      break;
    }
  }
  // fecha DD/MM o DD-MM
  const fechaM = t.match(/(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{4}))?/);
  if (fechaM) {
    const y = fechaM[3] || hoy.getFullYear();
    intent.fecha = `${y}-${fechaM[2].padStart(2,'0')}-${fechaM[1].padStart(2,'0')}`;
  }

  return intent;
}

// ══════════════════════════════════════════
// FIREBASE QUERIES
// ══════════════════════════════════════════
async function fetchCRMData(intent, rawText) {
  const result = {};

  // ── planificador ──
  if (intent.actions.includes('planificador') || intent.actions.includes('add_plan') || intent.actions.includes('del_plan')) {
    const snap = await db.collection('_meta').doc('planificador').get();
    if (snap.exists) {
      const sched = snap.data().schedule || {};
      const hoy   = new Date().toISOString().split('T')[0];
      const fin   = new Date(); fin.setDate(fin.getDate()+8);
      const finStr = fin.toISOString().split('T')[0];
      const proximos = {};
      Object.keys(sched).sort().forEach(d => { if (d >= hoy && d <= finStr) proximos[d] = sched[d]; });
      result.planificador = proximos;
    }
  }

  // ── agenda Google Calendar ──
  if (intent.actions.includes('agenda')) {
    const fecha = intent.fecha || new Date().toISOString().split('T')[0];
    const dateMin = fecha + 'T00:00:00Z';
    const dateMax = fecha + 'T23:59:59Z';
    try {
      const r = await fetch(GAS + '?action=getCalendarEvents', {
        method: 'POST', headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ dateMin, dateMax })
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const d = await r.json();
      result.agenda = { fecha, eventos: d.success ? (d.events || []) : [] };
      if (!d.success && d.error) result.agenda.error = d.error;
    } catch(e) { result.agenda = { fecha, eventos: [], error: e.message }; }
  }

  // ── historial de actividades ──
  if (intent.actions.includes('historial') && intent.studioId) {
    const estudios = await getStudios();
    const s = estudios.find(x => x.id == intent.studioId);
    if (s) {
      const acts = (s.activities || []).slice().reverse(); // más reciente primero
      result.historial = {
        studio_id: s.id,
        nombre: s.name,
        total_actividades: acts.length,
        actividades: acts
      };
    }
  }

  // ── stats ──
  if (intent.actions.includes('stats')) {
    const estudios = await getStudios();
    const hoy    = new Date().toISOString().split('T')[0];
    const lunesD = new Date(); lunesD.setDate(lunesD.getDate() - lunesD.getDay() + (lunesD.getDay()===0?-6:1));
    const lunes  = lunesD.toISOString().split('T')[0];
    let v=0, ll=0, em=0, wa=0; const ids = new Set();
    estudios.forEach(s => {
      (s.activities||[]).forEach(a => {
        if (a.date >= lunes && a.date <= hoy) {
          if (a.type==='visita')  { v++;  ids.add(s.id); }
          if (a.type==='llamada') { ll++; ids.add(s.id); }
          if (a.type==='email')   { em++; ids.add(s.id); }
          if (a.type==='whatsapp'){ wa++; ids.add(s.id); }
        }
      });
    });
    result.stats = { semana: `${lunes} → ${hoy}`, visitas:v, llamadas:ll, emails:em, whatsapps:wa, estudios_contactados: ids.size };
  }

  // ── detalle de un studio ──
  if (intent.studioId && intent.actions.includes('detail')) {
    const estudios = await getStudios();
    const s = estudios.find(x => x.id == intent.studioId);
    if (s) result.studio = formatStudio(s, true);
  }

  // ── búsqueda ──
  if (intent.actions.includes('search') || intent.actions.includes('add_plan') || intent.actions.includes('add_act')) {
    const estudios = await getStudios();
    let filtrados = estudios;

    if (intent.studioId) {
      filtrados = filtrados.filter(s => s.id == intent.studioId);
    } else {
      if (intent.provincia) filtrados = filtrados.filter(s => (s.province||'').toLowerCase().includes(intent.provincia.toLowerCase()));
      if (intent.tipo)      filtrados = filtrados.filter(s => (s.type||'').toLowerCase().includes(intent.tipo));
      if (intent.ciudad)    filtrados = filtrados.filter(s => (s.city||s.data?.contact?.city||'').toLowerCase().includes(intent.ciudad.toLowerCase()));
      // buscar nombre libre en el texto (palabras >4 letras que no sean stopwords)
      if (!intent.provincia && !intent.tipo && !intent.studioId) {
        const stops = new Set(['busca','muestra','dame','lista','todos','todas','los','las','que','con','sin','para','una','estudio','estudios','empresa','empresas','arquitectura','ingeniería','ingenieria','cádiz','cadiz','málaga','malaga','granada','sevilla','en','de','del','la','el','un']);
        const palabras = rawText.toLowerCase().split(/\s+/).filter(w => w.length > 3 && !stops.has(w));
        if (palabras.length) {
          filtrados = filtrados.filter(s => {
            const hay = (s.name+' '+(s.city||'')).toLowerCase();
            return palabras.some(p => hay.includes(p));
          });
        }
      }
    }

    if (intent.dias) {
      const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - intent.dias);
      const cutoffStr = cutoff.toISOString().split('T')[0];
      filtrados = filtrados.filter(s => {
        const vs = (s.activities||[]).filter(a => a.type==='visita');
        return !vs.length || vs[vs.length-1].date < cutoffStr;
      });
    }

    filtrados.sort((a,b) => (b.score||b.data?.score||0)-(a.score||a.data?.score||0));
    const full = intent.studioId && filtrados.length === 1;
    result.studios = filtrados.slice(0, full ? 1 : 10).map(s => formatStudio(s, full));
    result.total = filtrados.length;
  }

  // ── búsqueda externa ──
  if (intent.actions.includes('search_new')) {
    const location = intent.ciudad || intent.provincia;
    const tipo     = intent.tipo || 'ingenieria';
    if (!location) {
      result.error_busqueda = 'No se detectó ciudad o provincia en la consulta.';
    } else {
      // Intentar Páginas Amarillas; si falla/bloquea → Claude usa conocimiento propio
      let paOk = false;
      try {
        const paResults  = await searchPaginasAmarillas(tipo, location);
        const crmStudios = await getStudios();
        const paFiltrados = intent.ciudad
          ? paResults.filter(r => r.ciudad.toLowerCase().includes(intent.ciudad.toLowerCase()) || intent.ciudad.toLowerCase().includes(r.ciudad.toLowerCase()))
          : paResults;
        if (paFiltrados.length > 0) {
          const nuevos  = paFiltrados.filter(r => !isAlreadyInCRM(r.nombre, crmStudios));
          const yaEnCRM = paFiltrados.filter(r =>  isAlreadyInCRM(r.nombre, crmStudios));
          result.busqueda_externa = {
            fuente: `Páginas Amarillas — ${tipo} en ${location}`,
            total_encontrados: paFiltrados.length,
            nuevos_no_en_crm: nuevos.length,
            ya_en_crm: yaEnCRM.length,
            nuevos
          };
          paOk = true;
        }
      } catch(e) { /* PA no disponible */ }

      if (!paOk) {
        // Páginas Amarillas bloqueada — pedimos a Claude que use su conocimiento
        result.busqueda_externa = {
          fuente: 'conocimiento_claude',
          tipo,
          location,
          instruccion: `Páginas Amarillas no está disponible. Usa tu conocimiento de entrenamiento para listar ${tipo}s reales en ${location} que podrían ser clientes de Ferroplast/GPF (tuberías HDPE, saneamiento, obras). Incluye nombre, breve descripción y si es posible teléfono/web. Máximo 8 empresas. Añade siempre: "⚠️ Datos de entrenamiento — verificar vigencia."`
        };
      }
    }
  }

  return result;
}

function formatStudio(s, full = false) {
  const base = {
    id:        s.id,
    nombre:    s.name,
    ciudad:    s.city || s.data?.contact?.city || '',
    provincia: s.province || '',
    tipo:      s.type,
    score:     s.score || s.data?.score || '',
    telefono:  s.phone || s.data?.contact?.phone || '',
    email:     s.email || s.data?.contact?.email || '',
    web:       s.web   || s.data?.contact?.web   || '',
    actividades: (s.activities||[]).length,
    ultima_visita: (() => { const v=(s.activities||[]).filter(a=>a.type==='visita'); return v.length?v[v.length-1].date:null; })()
  };
  if (full) {
    base.direccion  = s.address || s.data?.contact?.address || '';
    base.proyectos  = (s.data?.projects||[]).slice(0,4);
    base.pitch_llamada = s.data?.comms?.callPitch || '';
    base.pitch_email   = s.data?.comms?.emailBody  || '';
    base.next_action   = s.data?.nextAction || '';
    base.ultimas_actividades = (s.activities||[]).slice(-5);
  }
  return base;
}

// ══════════════════════════════════════════
// PÁGINAS AMARILLAS — búsqueda externa
// ══════════════════════════════════════════
const PA_MAP = {
  arquitectura: 'arquitectos',
  ingenieria:   'ingenieros',
  ingeniería:   'ingenieros',
  constructora: 'empresas-de-construccion',
  promotora:    'promotoras-inmobiliarias',
  aguas:        'abastecimiento-de-aguas',
  regantes:     'comunidades-de-regantes',
  otros:        'ingenieros'
};

function toSlug(str) {
  return str.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/\s+/g,'-').replace(/[^a-z0-9\-]/g,'');
}

// Fetch externo via GAS (UrlFetchApp — servidores Google, evita Incapsula)
async function fetchWithProxy(url) {
  const r = await fetch(GAS + '?action=fetchUrl', {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ url })
  });
  if (!r.ok) throw new Error('GAS fetchUrl HTTP ' + r.status);
  const d = await r.json();
  if (d.error) throw new Error('GAS fetchUrl error: ' + d.error);
  if (!d.html) throw new Error('GAS fetchUrl: sin contenido');
  return d.html;
}

async function searchPaginasAmarillas(tipo, location, maxPages = 2) {
  const cat = PA_MAP[tipo] || PA_MAP['ingenieria'];
  const slug = toSlug(location);
  const base = `https://www.paginasamarillas.es/a/${cat}/${slug}/`;
  const results = [];

  for (let page = 1; page <= maxPages; page++) {
    const url = page === 1 ? base : `${base}${page}`;
    let html;
    try { html = await fetchWithProxy(url); }
    catch(e) { if (page === 1) throw e; break; }

    const doc = new DOMParser().parseFromString(html, 'text/html');
    const listings = doc.querySelectorAll('[itemtype*="LocalBusiness"]');
    if (!listings.length) break;

    listings.forEach(el => {
      const name = el.querySelector('[itemprop="name"]')?.textContent?.trim();
      if (!name || name.length < 3) return;
      results.push({
        nombre:    name,
        telefono:  el.querySelector('[itemprop="telephone"]')?.textContent?.trim() || '',
        direccion: el.querySelector('[itemprop="streetAddress"]')?.textContent?.trim() || '',
        ciudad:    el.querySelector('[itemprop="addressLocality"]')?.textContent?.trim() || location
      });
    });
  }
  return results;
}

function normName(n) {
  return n.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/\b(sl|slp|slu|sa|cb|sc|sll|soc|arq|ing|arquitecto|arquitectos|ingeniero|ingenieros|estudio|studio|asociados|consultores|consultoria|grupo|servicios)\b/g,'')
    .replace(/[^a-z0-9\s]/g,'').replace(/\s+/g,' ').trim();
}

function isAlreadyInCRM(paName, crmStudios) {
  const norm = normName(paName);
  return crmStudios.some(s => {
    const crmNorm = normName(s.name || '');
    if (!crmNorm || norm.length < 4) return false;
    // coincidencia si comparten al menos 60% de palabras clave
    const wordsA = norm.split(' ').filter(w => w.length > 3);
    const wordsB = crmNorm.split(' ').filter(w => w.length > 3);
    if (!wordsA.length) return false;
    const matches = wordsA.filter(w => wordsB.includes(w)).length;
    return matches / wordsA.length >= 0.6;
  });
}

async function addActivity(studioId, tipo, notas, resultado, fecha) {
  const estudios = await getStudios();
  const s = estudios.find(x => x.id == studioId);
  if (!s) return { ok:false, msg:`Studio ${studioId} no encontrado` };
  const act = { id: Date.now(), type: tipo, date: fecha||new Date().toISOString().split('T')[0], notes: notas, result: resultado||'pendiente', createdAt: new Date().toISOString() };
  const newActs = [...(s.activities||[]), act];
  await db.collection('studios').doc(s._docId).update({ activities: newActs });
  s.activities = newActs;
  return { ok:true, msg:`Actividad "${tipo}" registrada en "${s.name}"`, actividad: act };
}

async function addToPlan(studioId, fecha, reserva=false, priority='principal') {
  const estudios = await getStudios();
  const s = estudios.find(x => x.id == studioId);
  if (!s) return { ok:false, msg:`Studio ${studioId} no encontrado` };

  const ref  = db.collection('_meta').doc('planificador');
  const snap = await ref.get();
  const sched = snap.data()?.schedule || {};
  const dia   = [...(sched[fecha]||[])];

  if (dia.some(x => x.id == studioId)) return { ok:false, msg:`"${s.name}" ya está en el planificador el ${fecha}` };

  dia.push({ id:s.id, name:s.name, city:s.city||s.data?.contact?.city||'', reserva, priority });
  await ref.update({ schedule: { ...sched, [fecha]: dia }, lastModified: new Date().toISOString() });
  return { ok:true, msg:`✅ "${s.name}" añadido al planificador el ${fecha}` };
}

async function delFromPlan(studioId, fecha) {
  const estudios = await getStudios();
  const s = estudios.find(x => x.id == studioId);
  if (!s) return { ok:false, msg:`Studio ${studioId} no encontrado` };

  const ref   = db.collection('_meta').doc('planificador');
  const snap  = await ref.get();
  const sched = snap.data()?.schedule || {};
  const nuevo = (sched[fecha]||[]).filter(x => x.id != studioId);
  const newSched = { ...sched, [fecha]: nuevo };
  if (!nuevo.length) delete newSched[fecha];
  await ref.update({ schedule: newSched, lastModified: new Date().toISOString() });
  return { ok:true, msg:`🗑️ "${s.name}" eliminado del planificador el ${fecha}` };
}

async function addStudio(nombre, ciudad, provincia, tipo, telefono, email) {
  const estudios = await getStudios();
  const maxId = estudios.reduce((m, s) => Math.max(m, typeof s.id === 'number' ? s.id : 0), 0);
  const newId = maxId + 1;
  const newStudio = {
    id: newId,
    name: nombre,
    city: ciudad || '',
    province: provincia || '',
    type: tipo || 'arquitectura',
    phone: telefono || '',
    email: email || '',
    score: 50,
    activities: [],
    createdAt: new Date().toISOString(),
    data: {
      contact: { phone: telefono||'', email: email||'', city: ciudad||'' }
    }
  };
  const ref = await db.collection('studios').add(newStudio);
  newStudio._docId = ref.id;
  studioCache = null; // invalidar caché para forzar recarga
  return { ok: true, msg: `✅ "${nombre}" añadido al CRM con ID ${newId}`, studio_id: newId };
}

async function addCalendarEvent(studioId, fecha, hora, titulo) {
  const estudios = await getStudios();
  const s = estudios.find(x => x.id == studioId);
  if (!s) return { ok: false, msg: `Studio ${studioId} no encontrado` };
  const h = hora || '10:00';
  const tituloFinal = titulo || `Visita ${s.name}`;
  const start = new Date(`${fecha}T${h}:00`);
  const end   = new Date(start.getTime() + 60*60*1000); // 1h
  const eventData = {
    title: tituloFinal,
    startTime: start.toISOString(),
    end: end.toISOString(),
    type: 'meeting',
    description: `🏢 ${s.name}\n📍 ${s.city||''} (${s.province||''})\n📞 ${s.phone||s.data?.contact?.phone||'-'}\n📧 ${s.email||s.data?.contact?.email||'-'}\n\nCreado desde GPF Chat Assistant`,
    duration: 60
  };
  const r = await fetch(GAS + '?action=createCalendarEvent', {
    method: 'POST', headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ data: eventData })
  });
  if (!r.ok) return { ok: false, msg: 'Error HTTP ' + r.status };
  const d = await r.json();
  if (!d.success) return { ok: false, msg: d.error || 'Error creando evento' };
  return { ok: true, msg: `📅 "${tituloFinal}" creado en Google Calendar — ${fecha} ${h}` };
}

  const r = await fetch(GAS + '?action=claudeProxy', {

// Sistema para que Claude interprete la intención
const SYS_INTENT = `Hoy es {{HOY}}. Eres un analizador de intenciones para un CRM de ventas B2B (Ferroplast/GPF).
Dado el mensaje del usuario, devuelve ÚNICAMENTE un JSON válido sin texto adicional:
{"accion":"buscar"|"detalle"|"historial"|"planificador"|"stats"|"busqueda_externa"|"buscar_todo"|"agenda"|"add_studio"|"chat","tipo":"arquitectura"|"ingenieria"|"constructora"|"promotora"|"aapp"|"aguas"|"regantes"|null,"ciudad":null,"provincia":null,"studio_id":null,"dias_sin_visita":null,"score_min":null,"periodo":"hoy"|"esta_semana"|"semana_pasada"|"este_mes"|"ultimos_30_dias"|null,"fecha":null,"busqueda_externa":false}

Reglas:
- "accion":"chat" solo si es saludo/agradecimiento sin datos del CRM
- "accion":"busqueda_externa" cuando quiere empresas que NO están en el CRM
- "accion":"buscar_todo" cuando quiere TANTO las del CRM COMO las nuevas/externas (ej: "todas", "las del CRM y las que no estén")
- "accion":"planificador" cuando pregunta por su agenda o visitas programadas del planificador
- "accion":"stats" cuando pregunta cuántas visitas/llamadas ha hecho
- "accion":"agenda" cuando pregunta por eventos del calendario Google (ej: "¿qué tengo hoy?", "agenda del día")
- "accion":"historial" cuando pregunta por las actividades o historial de contacto de un estudio concreto
- "accion":"add_studio" cuando quiere añadir/dar de alta una empresa nueva en el CRM
- ciudad y provincia en español con mayúsculas (ej: "Jerez de la Frontera", "Cádiz")
- fecha en formato YYYY-MM-DD`;

async function callClaudeIntent(userText) {
  const hoy = new Date().toISOString().split('T')[0];
  const r = await fetch(GAS + '?action=claudeProxy', {
    method:'POST', headers:{'Content-Type':'text/plain'},
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 120,
      system: SYS_INTENT.replace('{{HOY}}', hoy),
      messages: [{ role:'user', content: userText }]
    })
  });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const d = await r.json();
  const text = d.content?.find(b => b.type === 'text')?.text || '{}';
  const match = text.match(/\{[\s\S]*\}/);
  return match ? JSON.parse(match[0]) : null;
}

function intentToLegacy(c) {
  if (!c) return detectIntent('buscar');
  const actions = [];
  switch(c.accion) {
    case 'buscar':           actions.push('search'); break;
    case 'detalle':          actions.push('detail', 'search'); break;
    case 'historial':        actions.push('historial', 'search'); break;
    case 'planificador':     actions.push('planificador'); break;
    case 'stats':            actions.push('stats'); break;
    case 'busqueda_externa': actions.push('search_new'); break;
    case 'buscar_todo':      actions.push('search', 'search_new'); break;
    case 'agenda':           actions.push('agenda'); break;
    case 'add_studio':       actions.push('add_studio'); break;
    default:                 actions.push('search');
  }
  if (c.busqueda_externa) { if (!actions.includes('search_new')) actions.push('search_new'); }
  return {
    actions,
    provincia:  c.provincia   || null,
    ciudad:     c.ciudad      || null,
    tipo:       (c.tipo||'').replace('ingeniería','ingenieria') || null,
    nombre:     null,
    studioId:   c.studio_id   || null,
    fecha:      c.fecha       || null,
    dias:       c.dias_sin_visita || null
  };
}

function finishReply(reply) {
  history.push({ role:'assistant', content: reply });
  if (history.length > 30) history = history.slice(-30);
  const m = reply.match(/<ACTION>([\s\S]*?)<\/ACTION>/);
  if (m) {
    try { return { text: reply.replace(/<ACTION>[\s\S]*?<\/ACTION>/,'').trim(), action: JSON.parse(m[1].trim()) }; }
    catch(e) {}
  }
  return { text: reply, action: null };
}

async function runAgent(userText) {
  history.push({ role:'user', content: userText });

  // ── Paso 1: Claude interpreta la intención ──
  addTool('🤔 Analizando consulta…');
  let claudeIntent = null;
  try { claudeIntent = await callClaudeIntent(userText); }
  catch(e) { /* fallback a regex */ }
  removeTool();

  // Si es conversación pura (saludo, etc.) responder directo
  if (claudeIntent?.accion === 'chat') {
    addTool('💬 Respondiendo…');
    const reply = await callClaude(history);
    removeTool();
    return finishReply(reply);
  }

  // ── Paso 2: Cargar datos de Firebase según lo que Claude decidió ──
  const intent = intentToLegacy(claudeIntent);
  addTool('🔍 Consultando el CRM…');
  let crmData = {};
  try { crmData = await fetchCRMData(intent, userText); }
  catch(e) { removeTool(); addTool('⚠️ Error Firebase: ' + e.message); }
  removeTool();

  // ── Paso 3: Claude responde con los datos reales ──
  const dataBlock = Object.keys(crmData).length
    ? `\n\n[DATOS_CRM]\n${JSON.stringify(crmData, null, 1)}` : '';
  const msgs = [...history.slice(0,-1), { role:'user', content: userText + dataBlock }];

  addTool('✍️ Generando respuesta…');
  const reply = await callClaude(msgs);
  removeTool();

  return finishReply(reply);
}

function showConfirm(bubble, action) {
  const bar = document.createElement('div'); bar.className = 'action-bar';
  const labels = { add_act:'✅ Registrar actividad', add_plan:'📅 Añadir al planificador', del_plan:'🗑️ Eliminar del planificador', add_studio:'🏢 Añadir al CRM', add_calendar:'📅 Crear en Calendar' };
  const btnOk = document.createElement('button'); btnOk.className='btn-confirm'; btnOk.textContent = labels[action.op]||'Confirmar';
  const btnNo = document.createElement('button'); btnNo.className='btn-cancel';  btnNo.textContent = 'Cancelar';

  btnOk.onclick = async () => {
    bar.remove();
    let res;
    addTool('💾 Guardando…');
    try {
      if (action.op==='add_act')      res = await addActivity(action.studio_id, action.tipo, action.notas, action.resultado, action.fecha);
      if (action.op==='add_plan')     res = await addToPlan(action.studio_id, action.fecha, action.reserva||false);
      if (action.op==='del_plan')     res = await delFromPlan(action.studio_id, action.fecha);
      if (action.op==='add_studio')   res = await addStudio(action.nombre, action.ciudad, action.provincia, action.tipo, action.telefono, action.email);
      if (action.op==='add_calendar') res = await addCalendarEvent(action.studio_id, action.fecha, action.hora, action.titulo);
      removeTool();
      addMsg('assistant', '', res?.msg || '✅ Hecho');
    } catch(e) { removeTool(); addMsg('assistant','','❌ Error: '+e.message); }
  };
  btnNo.onclick = () => { bar.remove(); addMsg('assistant','','De acuerdo, no se ha guardado nada.'); };
  bar.appendChild(btnOk); bar.appendChild(btnNo);
  bubble.appendChild(bar);
}

function scrollDown() { setTimeout(() => msgsEl.scrollTop = msgsEl.scrollHeight, 50); }

function setStatus(type, text) {
  document.getElementById('stDot').className = 'dot ' + type;
  document.getElementById('stTxt').textContent = text;
}

// Markdown mínimo
function md(t) {
  if (!t) return '';
  return t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^#### (.+)$/gm,'<h4>$1</h4>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>').replace(/^---$/gm,'<hr>')
    .replace(/^- (.+)$/gm,'<li>$1</li>').replace(/(<li>.*<\/li>\n?)+/gs,s=>`<ul>${s}</ul>`)
    .replace(/\n{2,}/g,'</p><p>').replace(/\n/g,'<br>')
    .replace(/^([^<])/, '<p>$1').replace(/([^>])$/, '$1</p>');
}

const inp = document.getElementById('userInput');
const btn = document.getElementById('sendBtn');

async function sendMessage() {
  const txt = inp.value.trim();
  if (!txt || busy) return;
  inp.value = ''; inp.style.height = 'auto';
  addMsg('user','',txt);
  await think(txt);
}

async function ask(txt) { if (busy) return; addMsg('user','',txt); await think(txt); }

async function think(txt) {
  busy = true; btn.disabled = true; addTyping();
  try {
    const { text, action } = await runAgent(txt);
    removeTyping();
    const bubble = addMsg('assistant','',text);
    if (action) showConfirm(bubble, action);
  } catch(e) {
    removeTyping();
    addMsg('assistant','','❌ Error: ' + e.message);
  } finally { busy=false; btn.disabled=false; inp.focus(); }
}

inp.addEventListener('input', () => { inp.style.height='auto'; inp.style.height=Math.min(inp.scrollHeight,110)+'px'; });
inp.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} });
